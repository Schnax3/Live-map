<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>LiveTrack — Echtzeit‑Standort</title>
        <link rel="manifest" href="manifest.json">
          <link rel="icon" href="favicon.ico" type="image/x-icon" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
          <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

              <style>
                  :root {
                        --bg:        #0a0c10;
                              --surface:   #12151c;
                                    --border:    #1e2330;
                                          --accent:    #00e5a0;
                                                --accent2:   #ff4d6d;
                                                      --accent3:   #4d8eff;
                                                            --text:      #e8eaf0;
                                                                  --muted:     #5a6075;
                                                                        --font-mono: 'Space Mono', monospace;
                                                                              --font-sans: 'Syne', sans-serif;
                                                                                    --radius:    10px;
                                                                                        }

                                                                                            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
                                                                                                html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-sans); }

                                                                                                    #app { display: grid; grid-template-rows: 56px 1fr; grid-template-columns: 320px 1fr; height: 100vh; }

                                                                                                        #header { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 100; }
                                                                                                            #header .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
                                                                                                                #header .logo span { color: var(--text); }
                                                                                                                    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.4s; flex-shrink: 0; }
                                                                                                                        #status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
                                                                                                                            #status-dot.error  { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
                                                                                                                                @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
                                                                                                                                    #status-text { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
                                                                                                                                        .spacer { flex: 1; }
                                                                                                                                            #user-badge { font-family: var(--font-mono); font-size: 11px; background: var(--border); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; color: var(--accent3); }
                                                                                                                                                #online-count { background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 10px; font-weight: 700; border-radius: 20px; padding: 3px 10px; }

                                                                                                                                                    #sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
                                                                                                                                                        .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
                                                                                                                                                            .sidebar-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
                                                                                                                                                                #my-coords { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
                                                                                                                                                                    .coord-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
                                                                                                                                                                        .coord-box .label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
                                                                                                                                                                            .coord-box .value { font-family: var(--font-mono); font-size: 13px; color: var(--accent); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                                                                                                                                                                                #user-list-container { flex: 1; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
                                                                                                                                                                                    #user-list-container::-webkit-scrollbar { width: 4px; }
                                                                                                                                                                                        #user-list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
                                                                                                                                                                                            .user-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; animation: fadeIn 0.3s ease; }
                                                                                                                                                                                                @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
                                                                                                                                                                                                    .user-card:hover { border-color: var(--accent3); transform: translateX(3px); }
                                                                                                                                                                                                                                                                                                                                                                                                            .user-card.is-me  { border-color: var(--accent); }
                                                                                                                                                                                                                                                                                                                                                                                                                .user-card.is-target { border-color: var(--accent2); box-shadow: 0 0 0 1px rgba(255,77,109,0.25); }
                                                                                                                                                                                                            .user-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
                                                                                                                                                                                                                .user-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; color: #000; }
                                                                                                                                                                                                                    .user-name { font-size: 13px; font-weight: 600; }
                                                                                                                                                                                                                        .user-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
                                                                                                                                                                                                                            .user-meta span { display: flex; flex-direction: column; }
                                                                                                                                                                                                                                .user-meta .ml { color: var(--text); margin-top: 1px; }
                                                                                                                                                                                                                                                                                                                                                                    #error-panel { display: none; background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.4); border-radius: var(--radius); padding: 12px; margin: 16px; font-size: 12px; font-family: var(--font-mono); color: var(--accent2); line-height: 1.6; }
                                                                                                                                                                                                                                                                                                                                                                        #game-panel { padding: 16px; border-bottom: 1px solid var(--border); }
                                                                                                                                                                                                                                                                                                                                                                            .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
                                                                                                                                                                                                                                                                                                                                                                                .game-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
                                                                                                                                                                                                                                                                                                                                                                                    .game-card .label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
                                                                                                                                                                                                                                                                                                                                                                                        .game-card .value { font-family: var(--font-mono); font-size: 12px; color: var(--text); margin-top: 3px; }
                                                                                                                                                                                                                                                                                                                                                                                            .game-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
                                                                                                                                                                                                                                                                                                                                                                                                .game-btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: transform 0.15s, border-color 0.2s, background 0.2s; }
                                                                                                                                                                                                                                                                                                                                                                                                    .game-btn:hover { transform: translateY(-1px); border-color: var(--accent3); }
                                                                                                                                                                                                                                                                                                                                                                                                        .game-btn.primary { background: var(--accent); color: #000; border-color: transparent; font-weight: 700; }
                                                                                                                                                                                                                                                                                                                                                                                                            .game-btn.secondary { background: transparent; color: var(--accent3); }
                                                                                                                                                                                                                                                                                                                                                                                                                .game-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
                                                                                                                                                                                                                                                                                                                                                                                                                    .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-family: var(--font-mono); background: var(--border); color: var(--muted); }
                                                                                                                                                                                                                                                                                                                                                                                                                        .pill.active { background: rgba(0,229,160,0.2); color: var(--accent); border: 1px solid rgba(0,229,160,0.4); }
                                                                                                                                                                                                                                                                                                                                                                                                                            .pill.warn { background: rgba(255,179,64,0.16); color: #ffb340; border: 1px solid rgba(255,179,64,0.3); }
                                                                                                                                                                                                                                                                                                                                                                                                                                .powerup-card { background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius); padding: 12px; margin-top: 10px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                    .powerup-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                        .powerup-desc { font-family: var(--font-mono); font-size: 11px; color: var(--muted); line-height: 1.5; }
                                                                                                                                                                                                                                                                                                                                                                                                                                           .powerup-meta { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                #stats-panel { padding: 16px; border-top: 1px solid var(--border); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        .stat-row { display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                            .stat-value { color: var(--text); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                .history-list { margin-top: 10px; display: grid; gap: 6px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .history-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .history-item .badge { padding: 2px 6px; border-radius: 12px; font-size: 10px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .badge.win { background: rgba(0,229,160,0.2); color: var(--accent); border: 1px solid rgba(0,229,160,0.4); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .badge.lose { background: rgba(255,77,109,0.15); color: var(--accent2); border: 1px solid rgba(255,77,109,0.3); }

                                                                                                                                                                                                                                        #map { z-index: 1; background: #0e111a; }
                                                                                                                                                                                                                                            .leaflet-tile { filter: brightness(0.6) saturate(0.4) hue-rotate(180deg); }
                                                                                                                                                                                                                                                .leaflet-popup-content-wrapper { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; color: var(--text) !important; font-family: var(--font-mono) !important; font-size: 12px !important; }
                                                                                                                                                                                                                                                    .leaflet-popup-tip { background: var(--surface) !important; }
                                                                                                                                                                                                                                                        .leaflet-popup-close-button { color: var(--muted) !important; }

                                                                                                                                                                                                                                                            #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; transition: opacity 0.5s; }
                                                                                                                                                                                                                                                                #loading.hidden { opacity: 0; pointer-events: none; }
                                                                                                                                                                                                                                                                    .loading-logo { font-family: var(--font-sans); font-size: 28px; font-weight: 800; color: var(--accent); }
                                                                                                                                                                                                                                                                        .loading-spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
                                                                                                                                                                                                                                                                            @keyframes spin { to { transform: rotate(360deg); } }
                                                                                                                                                                                                                                                                                .loading-msg { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

                                                                                                                                                                                                                                                                                                      @media (max-width: 640px) {
                                                                                                                                                                                                                                                                                                           #app { grid-template-columns: 1fr; grid-template-rows: 56px 1fr; }
                                                                                                                                                                                                                                                                                                                 #map { grid-row: 2; }
                                                                                                                                                                                                                                                                                                                        #sidebar {
                                                                                                                                                                                                                                                                                                                            position: fixed;
                                                                                                                                                                                                                                                                                                                                  left: 0;
                                                                                                                                                                                                                                                                                                                                        right: 0;
                                                                                                                                                                                                                                                                                                                                              bottom: 0;
                                                                                                                                                                                                                                                                                                                                                     height: 85vh;
                                                                                                                                                                                                                                                                                                                                                           z-index: 200;
                                                                                                                                                                                                                                                                                                                                                                 border-right: none;
                                                                                                                                                                                                                                                                                                                                                                       border-top: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                             background: rgba(18,21,28,0.95);
                                                                                                                                                                                                                                                                                                                                                                                   backdrop-filter: blur(8px);
                                                                                                                                                                                                                                                                                                                                                                                         box-shadow: 0 -10px 30px rgba(0,0,0,0.35);
                                                                                                                                                                                                                                                                                                                                                                                               padding-bottom: calc(10px + env(safe-area-inset-bottom));
                                                                                                                                                                                                                                                                                                                                                                                                transform: translateY(70vh);
                                                                                                                                                                                                                                                                                                                                                                                                transition: transform 0.25s ease;
                                                                                                                                                                                                                                                                                                                                                                                                overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                                                                     }
                                                                                                                                                                                                                                                                                                                           #sidebar.sheet-mid { transform: translateY(40vh); }
                                                                                                                                                                                                                                                                                                                           #sidebar.sheet-open { transform: translateY(0); }
                                                                                                                                                                                                                                                                                                                            #sidebar-scroll {
                                                                                                                                                                                                                                                                                                                                  height: calc(100% - 22px);
                                                                                                                                                                                                                                                                                                                                  overflow-y: auto;
                                                                                                                                                                                                                                                                                                                                  -webkit-overflow-scrolling: touch;
                                                                                                                                                                                                                                                                                                                                  overscroll-behavior: contain;
                                                                                                                                                                                                                                                                                                                                  padding-bottom: env(safe-area-inset-bottom);
                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                           #sheet-handle {
                                                                                                                                                                                                                                                                                                                                 position: sticky;
                                                                                                                                                                                                                                                                                                                                 top: 0;
                                                                                                                                                                                                                                                                                                                                 display: flex;
                                                                                                                                                                                                                                                                                                                                 align-items: center;
                                                                                                                                                                                                                                                                                                                                 justify-content: center;
                                                                                                                                                                                                                                                                                                                                 height: 22px;
                                                                                                                                                                                                                                                                                                                                 cursor: grab;
                                                                                                                                                                                                                                                                                                                                z-index: 2;
                                                                                                                                                                                                                                                                                                                                 background: linear-gradient(to bottom, rgba(18,21,28,0.98), rgba(18,21,28,0.85));
                                                                                                                                                                                                                                                                                                                                  touch-action: none;
                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                            #sheet-handle::before {
                                                                                                                                                                                                                                                                                                                                  content: "";
                                                                                                                                                                                                                                                                                                                                  display: block;
                                                                                                                                                                                                                                                                                                                                  width: 40px;
                                                                                                                                                                                                                                                                                                                                  height: 4px;
                                                                                                                                                                                                                                                                                                                                  background: var(--border);
                                                                                                                                                                                                                                                                                                                                  border-radius: 999px;
                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                             #sidebar .sidebar-section { padding-top: 8px; }
                                                                                                                                                                                                                                                                                                                                   #user-list-container {
                                                                                                                                                                                                                                                                                                                                         max-height: none;
                                                                                                                                                                                                                                                                                                                                               overflow: visible;
                                                                                                                                                                                                                                                                                                                                                     flex: none;
                                                                                                                                                                                                                                                                                                                                                           padding: 16px 16px 28px;
                                                                                                                                                                                                                                                                                                                                                                 }
                                                                                                                                                                                                                                                                                                                                        #game-panel { padding-bottom: 8px; }
                                                                                                                                                                                                                                                                                                                                               .game-actions { grid-template-columns: 1fr; }
                                                                                                                                                                                                                                                                                                                                                     .game-btn { font-size: 12px; padding: 10px 12px; }
                                                                                                                                                                                                                                                                                                                                                           .game-grid { grid-template-columns: 1fr 1fr; }
                                                                                                                                                                                                                                                                                                                                                                 .powerup-meta { gap: 4px; }
                                                                                                                                                                                                                                                                                                                                                                       #stats-panel { padding-bottom: 8px; }
                                                                                                                                                                                                                                                                                                                                                                             }
                                                                                                                                                                                                                                                                                                      </style>
                                                                                                                                                                                                                                                                                                      </head>
                                                                                                                                                                                                                                                                                                      <body>

                                                                                                                                                                                                                                                                                                      <div id="loading">
                                                                                                                                                                                                                                                                                                        <div class="loading-logo">LiveTrack</div>
                                                                                                                                                                                                                                                                                                          <div class="loading-spinner"></div>
                                                                                                                                                                                                                                                                                                            <div class="loading-msg" id="loading-msg">Initialisiere…</div>
                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                            <div id="app">
                                                                                                                                                                                                                                                                                                              <header id="header">
                                                                                                                                                                                                                                                                                                                  <div class="logo">Live<span>Track</span></div>
                                                                                                                                                                                                                                                                                                                      <div id="status-dot"></div>
                                                                                                                                                                                                                                                                                                                          <div id="status-text">Verbinde…</div>
                                                                                                                                                                                                                                                                                                                              <div class="spacer"></div>
                                                                                                                                                                                                                                                                                                                                  <div id="online-count">0 online</div>
                                                                                                                                                                                                                                                                                                                                      <div id="user-badge">–</div>
                                                                                                                                                                                                                                                                                                                                        </header>

                                                                                                                                                                                                                                                                                                                                          <aside id="sidebar">
                                                                                                                                                                                                                                                                                                                                              <div id="sheet-handle" aria-label="Sheet Handle"></div>
                                                                                                                                                                                                                                                                                                                                              <div id="sidebar-scroll">
                                                                                                                                                                                                                                                                                                                                             <div class="sidebar-section">
                                                                                                                                                                                                                                                                                                                                                    <div class="sidebar-label">Mein Standort</div>
                                                                                                                                                                                                                                                                                                                                                          <div id="my-coords">
                                                                                                                                                                                                                                                                                                                                                                  <div class="coord-box"><div class="label">Lat</div><div class="value" id="my-lat">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                          <div class="coord-box"><div class="label">Lng</div><div class="value" id="my-lng">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                  <div class="coord-box"><div class="label">Accuracy</div><div class="value" id="my-acc">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                          <div class="coord-box"><div class="label">Updated</div><div class="value" id="my-time">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                               </div>
                                                                                                                                                                                                                                                                                                                                                                                                   </div>
                                                                                                                                                                                                                                                                                                                                                                                                    <div id="game-panel">
                                                                                                                                                                                                                                                                                                                                                                                                        <div class="sidebar-label">Jagd</div>
                                                                                                                                                                                                                                                                                                                                                                                                            <div class="game-grid">
                                                                                                                                                                                                                                                                                                                                                                                                                <div class="game-card"><div class="label">Dein Ziel</div><div class="value" id="target-id">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="game-card"><div class="label">Status</div><div class="value" id="target-status">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="game-card"><div class="label">Letzte Sichtung</div><div class="value" id="target-last">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="game-card"><div class="label">Nächste Aktualisierung</div><div class="value" id="target-next">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="game-actions">
                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="game-btn primary" id="catch-btn">Ziel gefangen</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="game-btn secondary" id="skip-btn">Power-Up wechseln</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   <div class="powerup-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="powerup-title" id="powerup-title">Power‑Up –</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="powerup-desc" id="powerup-desc">–</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="powerup-meta">
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <span class="pill" id="powerup-state">Bereit</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span class="pill warn" id="powerup-cooldown">Cooldown –</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <span class="pill" id="skip-count">Skips: 0/3</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="game-actions" style="margin-top:10px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="game-btn" id="powerup-use">Power-Up nutzen</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="game-btn secondary" id="powerup-cancel">Power-Up abbrechen</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div id="stats-panel">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="sidebar-label">Statistik</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="stats-grid">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="game-card"><div class="label">Heute</div><div class="value" id="stat-today">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="game-card"><div class="label">Streak</div><div class="value" id="stat-streak">–</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="history-list" id="history-list"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                       <div id="error-panel"></div>
                                                                                                                                                                                                                                                                                                                                                                                                            <div class="sidebar-label" style="padding: 16px 16px 0; margin-bottom:0;">Alle Nutzer</div>
                                                                                                                                                                                                                                                                                                                                                                                                                <div id="user-list-container"><div id="user-list"></div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                  </aside>
